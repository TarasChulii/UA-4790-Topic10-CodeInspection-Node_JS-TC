name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # Uses the official GitHub action for checking out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 

      - name: Set up Node.js
        # Uses the official GitHub action for setting up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your desired Node.js version

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @sonar/scan
          npm install --save-dev jest

      - name: Run Tests with Coverage
        # This command generates the LCOV report in the 'coverage/' directory
        run: npm test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
