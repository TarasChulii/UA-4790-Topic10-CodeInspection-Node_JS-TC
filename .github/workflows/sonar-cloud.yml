name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # Uses the official GitHub action for checking out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        # Uses the official GitHub action for setting up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your desired Node.js version

      - name: Install Dependencies
        run: npm install

      - name: Run Tests with Coverage
        # This command generates the LCOV report in the 'coverage/' directory
        run: npm test -- --coverage

      - name: Run SonarQube Scanner
        # Uses the official SonarSource GitHub Action for C, C++, and other languages
        uses: SonarSource/sonarqube-scan-action@v2.1.0
        env:
          # Reference the GitHub secret for the Sonar token
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
